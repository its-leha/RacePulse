<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RacePulse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="session-info">
                <span id="session-name">RacePulse</span>
                <span id="session-type"></span>
            </div>
            <div id="lap-info">
                LAP <span id="lap-num">–</span> / <span id="lap-total">–</span>
            </div>
            <div id="controls">
                <span id="status-dot" class="dot-idle" title="Статус"></span>
                <button id="refresh-btn" title="Обновить">↻</button>
            </div>
        </header>

        <div id="weather-bar">
            <span>AIR <strong id="w-air">–</strong>°C</span>
            <span>TRK <strong id="w-trk">–</strong>°C</span>
            <span>HUM <strong id="w-hum">–</strong>%</span>
            <span>WIND <strong id="w-wind">–</strong> m/s</span>
            <span id="last-update-label">–</span>
        </div>

        <div id="content">
            <section id="timing-section">
                <div id="tower-head" class="tower-row tower-head">
                    <span class="col-pos">POS</span>
                    <span class="col-driver">DRIVER</span>
                    <span class="col-status">STATUS</span>
                    <span class="col-gap">GAP</span>
                    <span class="col-int">INT</span>
                    <span class="col-last">LAST LAP</span>
                    <span class="col-best">BEST LAP</span>
                    <span class="col-tyre">TYRE</span>
                </div>
                <div id="timing-tower">
                    <div class="info-msg">Загрузка...</div>
                </div>
            </section>

            <aside id="side-panel">
                <div id="rc-panel">
                    <div class="panel-title">Race Control</div>
                    <div id="rc-list"><div class="info-msg">–</div></div>
                </div>
            </aside>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
